<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>経費精算 | 一般社団法人P</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- ▼▼▼ Firebaseの設定をここに貼り付けてください ▼▼▼ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ★ここにFirebaseコンソールからコピーしたconfigを貼る★
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._fb = { db, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy };
  window.dispatchEvent(new Event('firebaseReady'));
</script>
<!-- ▲▲▲ Firebase設定ここまで ▲▲▲ -->

<style>
:root {
  --navy:#1a2744; --navy-light:#243260; --gold:#c9a84c; --gold-light:#e8c97a;
  --cream:#faf8f4; --white:#fff; --gray-50:#f8f9fa; --gray-100:#f0f0f0;
  --gray-200:#e0e0e0; --gray-400:#aaa; --gray-600:#666; --gray-800:#333;
  --green:#2d7a4f; --green-bg:#e8f4e8; --red:#c0392b; --red-bg:#fdecea;
  --orange:#d35400; --orange-bg:#fef3e2;
  --shadow:0 2px 12px rgba(26,39,68,.10); --shadow-lg:0 8px 32px rgba(26,39,68,.16);
  --radius:10px; --font:'Helvetica Neue',Arial,'Hiragino Sans','Meiryo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--cream);color:var(--gray-800);min-height:100vh;font-size:14px;}

/* ヘッダー */
.header{background:var(--navy);color:var(--white);padding:0 20px;display:flex;align-items:center;
  justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-title{font-size:16px;font-weight:700;letter-spacing:.05em;display:flex;align-items:center;gap:10px;}
.header-title span{color:var(--gold);}
.header-badge{background:var(--gold);color:var(--navy);font-size:10px;font-weight:700;
  padding:2px 8px;border-radius:20px;letter-spacing:.05em;}

/* タブ */
.tabs{background:var(--navy-light);display:flex;padding:0 16px;overflow-x:auto;gap:2px;}
.tab{color:rgba(255,255,255,.6);padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;
  border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* メイン */
.main{max-width:960px;margin:0 auto;padding:20px 14px;}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px;}
.card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;padding-bottom:10px;
  border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:8px;}

/* フォーム */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.tab{padding:10px 10px;font-size:11px;}}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;font-weight:600;color:var(--gray-600);}
.required::after{content:' *';color:var(--red);}
input,select,textarea{border:1.5px solid var(--gray-200);border-radius:6px;padding:8px 11px;
  font-size:14px;font-family:var(--font);color:var(--gray-800);background:var(--white);
  transition:border-color .2s;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--navy);}
textarea{resize:vertical;min-height:56px;}
.receipt-id-display{background:var(--navy);color:var(--gold);border-radius:6px;padding:8px 12px;
  font-size:16px;font-weight:700;letter-spacing:.1em;font-family:monospace;}
.readonly-field{background:var(--gray-50);font-weight:700;color:var(--navy);}

/* ボタン */
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;
  transition:all .2s;display:flex;align-items:center;gap:5px;}
.btn-primary{background:var(--navy);color:var(--white);}
.btn-primary:hover{background:var(--navy-light);}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--navy);}
.btn-outline:hover{background:var(--navy);color:var(--white);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-danger:hover{background:#a93226;}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#256041;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* フィルター行 */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-row input,.filter-row select{flex:1;min-width:130px;}

/* テーブル */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--navy);color:var(--white);padding:9px 11px;font-size:12px;font-weight:600;
  text-align:left;white-space:nowrap;}
td{padding:9px 11px;border-bottom:1px solid var(--gray-100);font-size:13px;vertical-align:middle;}
tr:hover td{background:var(--cream);}
.amount-cell{font-weight:700;color:var(--navy);text-align:right;white-space:nowrap;}

/* バッジ類 */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-orange{background:var(--orange-bg);color:var(--orange);}
.badge-navy{background:#e8edf8;color:var(--navy);}
.badge-gray{background:var(--gray-100);color:var(--gray-600);}
.kamoku-badge{display:inline-block;background:var(--gray-100);color:var(--gray-600);
  padding:2px 7px;border-radius:4px;font-size:11px;white-space:nowrap;}

/* 集計カード */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.summary-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;border-left:4px solid var(--gold);}
.summary-label{font-size:11px;color:var(--gray-600);font-weight:600;margin-bottom:3px;}
.summary-value{font-size:20px;font-weight:700;color:var(--navy);}
.summary-sub{font-size:11px;color:var(--gray-400);margin-top:2px;}

/* 立替者カード */
.person-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:18px;}
.person-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;}
.person-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.person-amount{font-size:18px;font-weight:700;color:var(--red);}
.person-count{font-size:11px;color:var(--gray-400);}
.person-settled{font-size:12px;color:var(--green);margin-top:3px;}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:14px;}
.modal{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  padding:24px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:18px;
  padding-bottom:10px;border-bottom:2px solid var(--gold);}

/* トースト */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--navy);color:var(--white);padding:11px 22px;border-radius:30px;
  font-size:13px;font-weight:600;box-shadow:var(--shadow-lg);z-index:9999;
  transition:transform .3s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}

/* ローディング・空 */
.loading{text-align:center;padding:36px;color:var(--gray-400);}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--gray-200);
  border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:44px 20px;color:var(--gray-400);}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* 精算ステータスライン */
.settled-info{background:var(--green-bg);border:1px solid #b2dfcc;border-radius:6px;
  padding:8px 12px;font-size:12px;color:var(--green);margin-top:4px;}
.unsettled-info{background:var(--red-bg);border:1px solid #f5c6c0;border-radius:6px;
  padding:6px 12px;font-size:12px;color:var(--red);}

/* ページ表示切替 */
.page{display:none;}
.page.active{display:block;}

/* 確認ダイアログ風 */
.confirm-box{background:var(--red-bg);border:1.5px solid var(--red);border-radius:8px;
  padding:14px;margin-bottom:16px;font-size:13px;color:var(--red);}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 経費精算 <span>P</span></div>
  <div class="header-badge">一般社団法人P</div>
</div>

<div class="tabs">
  <div class="tab active"  onclick="switchTab('entry')">＋ 新規入力</div>
  <div class="tab"         onclick="switchTab('list')">📄 一覧・編集</div>
  <div class="tab"         onclick="switchTab('tatekae')">💴 立替金精算</div>
  <div class="tab"         onclick="switchTab('summary')">📊 集計</div>
</div>

<!-- ========== 新規入力 ========== -->
<div id="page-entry" class="page active">
<div class="main">
<div class="card">
  <div class="card-title">💴 経費・立替金の入力</div>
  <div class="form-grid">

    <div class="form-group">
      <label class="required">領収書番号</label>
      <div class="receipt-id-display" id="receiptIdDisplay">──────</div>
      <small style="color:var(--gray-400);font-size:11px;margin-top:3px">保存時に自動採番</small>
    </div>

    <div class="form-group">
      <label class="required">支払日</label>
      <input type="date" id="entryDate">
    </div>

    <div class="form-group">
      <label class="required">勘定科目</label>
      <select id="entryKamoku">
        <option value="">── 選択してください ──</option>
        <optgroup label="【繰延資産】設立関連">
          <option value="創立費">創立費（設立登記前の費用）</option>
          <option value="開業費">開業費（設立後〜事業開始まで）</option>
        </optgroup>
        <optgroup label="【一般管理費】運営費">
          <option value="役員報酬">役員報酬</option>
          <option value="給与手当">給与手当</option>
          <option value="法定福利費">法定福利費</option>
          <option value="会議費">会議費</option>
          <option value="交際費">交際費</option>
          <option value="交通費">交通費・旅費</option>
          <option value="通信費">通信費</option>
          <option value="消耗品費">消耗品費</option>
          <option value="印刷費">印刷費・コピー代</option>
          <option value="広告宣伝費">広告宣伝費</option>
          <option value="賃借料">賃借料</option>
          <option value="支払手数料">支払手数料</option>
          <option value="顧問料">顧問料</option>
          <option value="諸会費">諸会費</option>
          <option value="図書費">図書費・資料費</option>
          <option value="雑費">雑費</option>
        </optgroup>
        <optgroup label="【税公課】">
          <option value="租税公課">租税公課</option>
          <option value="消費税">消費税</option>
        </optgroup>
        <optgroup label="【固定資産】">
          <option value="器具備品">器具備品</option>
          <option value="ソフトウェア">ソフトウェア</option>
        </optgroup>
      </select>
    </div>

    <div class="form-group">
      <label class="required">支払区分</label>
      <select id="entryPayType">
        <option value="">── 選択してください ──</option>
        <optgroup label="【立替払い】">
          <option value="立替（代表理事・土井）">立替 — 代表理事　土井 雅人</option>
          <option value="立替（理事・越宗）">立替 — 理事　越宗 孝昌</option>
          <option value="立替（理事・安井）">立替 — 理事　安井 正樹</option>
          <option value="立替（事務局・石川）">立替 — 事務局　石川 三千代</option>
        </optgroup>
        <optgroup label="【法人支払い】">
          <option value="法人口座">法人口座から振込</option>
          <option value="法人カード">法人クレジットカード</option>
        </optgroup>
      </select>
    </div>

    <div class="form-group">
      <label class="required">金額（税抜）</label>
      <input type="number" id="entryAmountEx" placeholder="0" min="0" oninput="calcTax('entry')">
    </div>

    <div class="form-group">
      <label>消費税率</label>
      <select id="entryTaxRate" onchange="calcTax('entry')">
        <option value="0.10">10%（標準）</option>
        <option value="0.08">8%（軽減）</option>
        <option value="0">非課税・不課税</option>
      </select>
    </div>

    <div class="form-group">
      <label>消費税額</label>
      <input type="number" id="entryTaxAmt" placeholder="0" readonly class="readonly-field">
    </div>

    <div class="form-group">
      <label>税込合計</label>
      <input type="number" id="entryAmountIn" placeholder="0" readonly class="readonly-field">
    </div>

    <div class="form-group full">
      <label class="required">支払先</label>
      <input type="text" id="entryVendor" placeholder="例：法務局、〇〇司法書士事務所">
    </div>

    <div class="form-group full">
      <label class="required">品目・摘要</label>
      <input type="text" id="entryDesc" placeholder="例：設立登記申請費用、会議室利用料">
    </div>

    <div class="form-group full">
      <label>事業関連性・備考</label>
      <textarea id="entryNote" placeholder="例：設立準備のための〇〇との協議（参加者：土井・石川・越宗）"></textarea>
    </div>

    <div class="form-group">
      <label>インボイス（適格請求書）</label>
      <select id="entryInvoice">
        <option value="あり">あり（登録番号確認済）</option>
        <option value="なし">なし</option>
        <option value="不要">非課税・不課税のため不要</option>
      </select>
    </div>

    <div class="form-group">
      <label>証憑の種類</label>
      <select id="entryProof">
        <option value="領収書">領収書</option>
        <option value="レシート">レシート</option>
        <option value="請求書">請求書</option>
        <option value="振込明細">振込明細</option>
        <option value="クレカ明細">クレジットカード明細</option>
        <option value="その他">その他</option>
      </select>
    </div>

    <div class="form-group full">
      <label>領収書画像リンク（Google Drive等・任意）</label>
      <input type="url" id="entryImageUrl" placeholder="Google DriveのリンクURLを貼り付け（任意）">
      <small style="color:var(--gray-400);font-size:11px;margin-top:3px">
        📁 推奨：領収書を撮影→Google Driveに保存→ファイル名を領収書番号に変更→リンクを貼付
      </small>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-outline" onclick="clearEntryForm()">クリア</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveEntry()">💾 保存する</button>
  </div>
</div>
</div>
</div>

<!-- ========== 一覧・編集 ========== -->
<div id="page-list" class="page">
<div class="main">
<div class="card">
  <div class="card-title">📄 経費一覧・編集・削除</div>

  <div class="filter-row">
    <input type="text" id="filterText" placeholder="🔍 品目・支払先・番号で検索" oninput="renderList()">
    <select id="filterKamoku" onchange="renderList()">
      <option value="">すべての勘定科目</option>
      <option value="創立費">創立費</option><option value="開業費">開業費</option>
      <option value="会議費">会議費</option><option value="交通費">交通費・旅費</option>
      <option value="交際費">交際費</option><option value="通信費">通信費</option>
      <option value="消耗品費">消耗品費</option><option value="支払手数料">支払手数料</option>
      <option value="租税公課">租税公課</option><option value="賃借料">賃借料</option>
    </select>
    <select id="filterPayType" onchange="renderList()">
      <option value="">すべての支払区分</option>
      <option value="立替">立替のみ</option>
      <option value="法人">法人支払のみ</option>
    </select>
    <select id="filterSettled" onchange="renderList()">
      <option value="">精算状況：すべて</option>
      <option value="unsettled">未精算のみ</option>
      <option value="settled">精算済のみ</option>
    </select>
  </div>

  <div class="btn-row" style="margin:0 0 14px;justify-content:flex-start;">
    <button class="btn btn-gold btn-sm" onclick="exportExcel('all')">📥 Excel出力</button>
    <button class="btn btn-outline btn-sm" onclick="loadEntries()">🔄 更新</button>
  </div>

  <div id="listContainer"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
</div>
</div>
</div>

<!-- ========== 立替金精算 ========== -->
<div id="page-tatekae" class="page">
<div class="main">

  <!-- 立替者別サマリー -->
  <div id="tatekaePersonCards"></div>

  <div class="card">
    <div class="card-title">💴 未精算の立替金一覧</div>

    <div class="filter-row">
      <select id="filterTataePerson" onchange="renderTatekae()">
        <option value="">全員</option>
        <option value="立替（代表理事・土井）">代表理事　土井</option>
        <option value="立替（理事・越宗）">理事　越宗</option>
        <option value="立替（理事・安井）">理事　安井</option>
        <option value="立替（事務局・石川）">事務局　石川</option>
      </select>
    </div>

    <div class="btn-row" style="margin:0 0 14px;justify-content:flex-start;gap:8px;">
      <button class="btn btn-green btn-sm" onclick="openBulkSettle()">✅ チェックした項目を一括精算</button>
      <button class="btn btn-gold btn-sm" onclick="exportExcel('tatekae')">📥 立替金一覧を出力</button>
    </div>

    <div id="tatekaeContainer"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
  </div>

  <!-- 精算済履歴 -->
  <div class="card">
    <div class="card-title">✅ 精算済み履歴</div>
    <div id="settledContainer"><div class="loading"><div class="spinner"></div><br>読み込み中...</div></div>
  </div>
</div>
</div>

<!-- ========== 集計 ========== -->
<div id="page-summary" class="page">
<div class="main">
  <div id="summaryContent"><div class="loading"><div class="spinner"></div><br>集計中...</div></div>
</div>
</div>

<!-- ========== 編集モーダル ========== -->
<div id="editModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="modal">
  <div class="modal-title">✏️ 経費を編集</div>
  <div class="form-grid" id="editFormContent"></div>
  <div class="btn-row">
    <button class="btn btn-danger btn-sm" onclick="deleteEntry()">🗑 削除</button>
    <button class="btn btn-outline" onclick="document.getElementById('editModal').style.display='none'">キャンセル</button>
    <button class="btn btn-primary" onclick="updateEntry()">💾 更新する</button>
  </div>
</div>
</div>

<!-- ========== 精算モーダル（個別） ========== -->
<div id="settleModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="modal">
  <div class="modal-title">✅ 立替金を精算する</div>
  <div id="settleModalContent"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="document.getElementById('settleModal').style.display='none'">キャンセル</button>
    <button class="btn btn-green" onclick="confirmSettle()">✅ 精算済みにする</button>
  </div>
</div>
</div>

<!-- ========== 一括精算モーダル ========== -->
<div id="bulkSettleModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="modal">
  <div class="modal-title">✅ 一括精算</div>
  <div id="bulkSettleContent"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="document.getElementById('bulkSettleModal').style.display='none'">キャンセル</button>
    <button class="btn btn-green" onclick="confirmBulkSettle()">✅ 選択した項目を精算済みにする</button>
  </div>
</div>
</div>

<!-- ========== 精算取消モーダル ========== -->
<div id="cancelSettleModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
<div class="modal">
  <div class="modal-title">↩️ 精算を取り消す</div>
  <div id="cancelSettleContent"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="document.getElementById('cancelSettleModal').style.display='none'">キャンセル</button>
    <button class="btn btn-danger" onclick="confirmCancelSettle()">↩️ 精算を取り消す</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 定数 =====
const KAMOKU_LIST = ["創立費","開業費","役員報酬","給与手当","法定福利費","会議費","交際費",
  "交通費","通信費","消耗品費","印刷費","広告宣伝費","賃借料","支払手数料",
  "顧問料","諸会費","図書費","雑費","租税公課","消費税","器具備品","ソフトウェア"];
const PAY_TYPES = ["立替（代表理事・土井）","立替（理事・越宗）","立替（理事・安井）",
  "立替（事務局・石川）","法人口座","法人カード"];
const PAY_LABELS = {
  "立替（代表理事・土井）":"代表理事・土井",
  "立替（理事・越宗）":"理事・越宗",
  "立替（理事・安井）":"理事・安井",
  "立替（事務局・石川）":"事務局・石川",
  "法人口座":"法人口座","法人カード":"法人カード"
};
const PROOF_TYPES = ["領収書","レシート","請求書","振込明細","クレカ明細","その他"];
const INVOICE_TYPES = ["あり","なし","不要"];
const SETTLE_METHODS = ["銀行振込","現金手渡し","口座振替","その他"];

// ===== 状態 =====
let entries = [];
let editingId = null;
let settlingId = null;
let cancelSettlingId = null;
let bulkSettleIds = [];
let firebaseReady = false;

// ===== Firebase待ち =====
window.addEventListener('firebaseReady', () => { firebaseReady = true; loadEntries(); generateNextId(); });

// ===== タブ切り替え =====
function switchTab(tab) {
  const tabs = ['entry','list','tatekae','summary'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='list') renderList();
  if(tab==='tatekae') renderTatekae();
  if(tab==='summary') renderSummary();
}

// ===== 領収書番号生成 =====
function generateNextId() {
  const year = new Date().getFullYear();
  const existing = entries.filter(e => e.receiptId && e.receiptId.startsWith('R'+year));
  const nums = existing.map(e => parseInt(e.receiptId.slice(5))||0);
  const next = nums.length>0 ? Math.max(...nums)+1 : 1;
  const id = `R${year}-${String(next).padStart(3,'0')}`;
  document.getElementById('receiptIdDisplay').textContent = id;
  return id;
}

// ===== 消費税計算 =====
function calcTax(prefix) {
  const ex = parseFloat(document.getElementById(prefix+'AmountEx').value)||0;
  const rate = parseFloat(document.getElementById(prefix+'TaxRate').value)||0;
  const tax = Math.floor(ex*rate);
  document.getElementById(prefix+'TaxAmt').value = tax;
  document.getElementById(prefix+'AmountIn').value = ex+tax;
}

// ===== データ保存 =====
async function saveEntry() {
  if(!firebaseReady){showToast('Firebase未接続','error');return;}
  const date=document.getElementById('entryDate').value;
  const kamoku=document.getElementById('entryKamoku').value;
  const payType=document.getElementById('entryPayType').value;
  const amountEx=parseFloat(document.getElementById('entryAmountEx').value)||0;
  const vendor=document.getElementById('entryVendor').value.trim();
  const desc=document.getElementById('entryDesc').value.trim();
  if(!date||!kamoku||!payType||!amountEx||!vendor||!desc){showToast('必須項目を入力してください','error');return;}

  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='保存中...';
  try {
    const receiptId = document.getElementById('receiptIdDisplay').textContent;
    const taxRate=parseFloat(document.getElementById('entryTaxRate').value)||0;
    const taxAmt=parseInt(document.getElementById('entryTaxAmt').value)||0;
    const amountIn=parseInt(document.getElementById('entryAmountIn').value)||0;
    const isTatekae = payType.includes('立替');
    const data = {
      receiptId, date, kamoku, payType, amountEx, taxRate, taxAmt, amountIn,
      vendor, desc,
      note: document.getElementById('entryNote').value.trim(),
      invoice: document.getElementById('entryInvoice').value,
      proof: document.getElementById('entryProof').value,
      imageUrl: document.getElementById('entryImageUrl').value.trim(),
      isTatekae, settled: false,
      settledDate:'', settledMethod:'', settledNote:'',
      createdAt: new Date().toISOString()
    };
    await window._fb.addDoc(window._fb.collection(window._fb.db,'expenses'), data);
    showToast(`✅ ${receiptId} を保存しました`,'success');
    clearEntryForm();
    await loadEntries();
    generateNextId();
  } catch(e){ showToast('保存エラー: '+e.message,'error'); }
  finally { btn.disabled=false; btn.textContent='💾 保存する'; }
}

// ===== フォームクリア =====
function clearEntryForm() {
  ['entryDate','entryKamoku','entryPayType','entryAmountEx','entryTaxAmt',
   'entryAmountIn','entryVendor','entryDesc','entryNote','entryImageUrl'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('entryTaxRate').value='0.10';
  document.getElementById('entryInvoice').value='あり';
  document.getElementById('entryProof').value='領収書';
  generateNextId();
}

// ===== データ読み込み =====
async function loadEntries() {
  if(!firebaseReady) return;
  try {
    const q = window._fb.query(window._fb.collection(window._fb.db,'expenses'), window._fb.orderBy('date','desc'));
    const snap = await window._fb.getDocs(q);
    entries = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList(); renderTatekae(); renderSummary();
  } catch(e){ console.error(e); }
}

// ===== 一覧レンダリング =====
function renderList() {
  const text=(document.getElementById('filterText')?.value||'').toLowerCase();
  const kamoku=document.getElementById('filterKamoku')?.value||'';
  const payF=document.getElementById('filterPayType')?.value||'';
  const settledF=document.getElementById('filterSettled')?.value||'';

  const filtered = entries.filter(e=>{
    const mt = !text||(e.desc||'').toLowerCase().includes(text)||
      (e.vendor||'').toLowerCase().includes(text)||(e.receiptId||'').toLowerCase().includes(text);
    const mk = !kamoku||e.kamoku===kamoku;
    const mp = !payF||(e.payType||'').includes(payF);
    const ms = !settledF||(settledF==='settled'?e.settled:!e.settled);
    return mt&&mk&&mp&&ms;
  });

  const total=filtered.reduce((s,e)=>s+(e.amountIn||0),0);
  let html='';
  if(!filtered.length){
    html=`<div class="empty"><div class="empty-icon">📭</div>該当データなし</div>`;
  } else {
    html=`<div style="font-size:12px;color:var(--gray-600);margin-bottom:8px">
      ${filtered.length}件｜合計 <strong style="color:var(--navy)">¥${total.toLocaleString()}</strong>（税込）
    </div><div class="table-wrap"><table><thead><tr>
      <th>番号</th><th>日付</th><th>勘定科目</th><th>支払先</th><th>品目・摘要</th>
      <th>支払区分</th><th style="text-align:right">税込金額</th><th>精算</th><th>領収書</th><th>操作</th>
    </tr></thead><tbody>`;
    filtered.forEach(e=>{
      const isTat=(e.payType||'').includes('立替');
      const settleBadge = isTat
        ? (e.settled
            ? `<span class="badge badge-green">✅精算済</span>`
            : `<span class="badge badge-red">🔴未精算</span>`)
        : `<span class="badge badge-gray">—</span>`;
      const payLabel = PAY_LABELS[e.payType]||e.payType||'—';
      const payClass = isTat?'badge-orange':'badge-navy';
      html+=`<tr>
        <td><code style="font-size:11px;font-family:monospace">${e.receiptId||'—'}</code></td>
        <td style="white-space:nowrap">${e.date||'—'}</td>
        <td><span class="kamoku-badge">${e.kamoku||'—'}</span></td>
        <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.vendor||''}">${e.vendor||'—'}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.desc||''}">${e.desc||'—'}</td>
        <td><span class="badge ${payClass}">${payLabel}</span></td>
        <td class="amount-cell">¥${(e.amountIn||0).toLocaleString()}</td>
        <td>${settleBadge}</td>
        <td>${e.imageUrl?`<a href="${e.imageUrl}" target="_blank" style="color:var(--navy);font-size:11px">🖼表示</a>`:'—'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openEdit('${e.id}')">編集</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  document.getElementById('listContainer').innerHTML=html;
}

// ===== 立替金タブ =====
function renderTatekae() {
  renderTatekaePersonCards();
  const personF=document.getElementById('filterTataePerson')?.value||'';
  const unsettled=entries.filter(e=>e.isTatekae&&!e.settled&&(!personF||e.payType===personF));
  const settled=entries.filter(e=>e.isTatekae&&e.settled);

  // 未精算
  let html='';
  if(!unsettled.length){
    html=`<div class="empty"><div class="empty-icon">🎉</div>未精算の立替金はありません</div>`;
  } else {
    const total=unsettled.reduce((s,e)=>s+(e.amountIn||0),0);
    html=`<div style="font-size:12px;color:var(--gray-600);margin-bottom:8px">
      ${unsettled.length}件｜未精算合計 <strong style="color:var(--red)">¥${total.toLocaleString()}</strong>
    </div><div class="table-wrap"><table><thead><tr>
      <th><input type="checkbox" id="checkAll" onchange="toggleAllChecks(this)"></th>
      <th>番号</th><th>日付</th><th>立替者</th><th>支払先</th><th>品目・摘要</th>
      <th style="text-align:right">税込金額</th><th>操作</th>
    </tr></thead><tbody>`;
    unsettled.forEach(e=>{
      const label=PAY_LABELS[e.payType]||e.payType;
      html+=`<tr>
        <td><input type="checkbox" class="settle-check" value="${e.id}"></td>
        <td><code style="font-size:11px;font-family:monospace">${e.receiptId||'—'}</code></td>
        <td style="white-space:nowrap">${e.date||'—'}</td>
        <td><span class="badge badge-orange">${label}</span></td>
        <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.vendor||'—'}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc||'—'}</td>
        <td class="amount-cell">¥${(e.amountIn||0).toLocaleString()}</td>
        <td><button class="btn btn-green btn-sm" onclick="openSettle('${e.id}')">精算する</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  document.getElementById('tatekaeContainer').innerHTML=html;

  // 精算済
  let shtml='';
  if(!settled.length){
    shtml=`<div class="empty"><div class="empty-icon">📋</div>精算済みの記録はありません</div>`;
  } else {
    shtml=`<div class="table-wrap"><table><thead><tr>
      <th>番号</th><th>精算日</th><th>立替者</th><th>支払先</th><th>品目</th>
      <th style="text-align:right">金額</th><th>精算方法</th><th>操作</th>
    </tr></thead><tbody>`;
    settled.forEach(e=>{
      const label=PAY_LABELS[e.payType]||e.payType;
      shtml+=`<tr>
        <td><code style="font-size:11px;font-family:monospace">${e.receiptId||'—'}</code></td>
        <td style="white-space:nowrap">${e.settledDate||'—'}</td>
        <td><span class="badge badge-green">${label}</span></td>
        <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.vendor||'—'}</td>
        <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.desc||'—'}</td>
        <td class="amount-cell">¥${(e.amountIn||0).toLocaleString()}</td>
        <td>${e.settledMethod||'—'}</td>
        <td><button class="btn btn-outline btn-sm" onclick="openCancelSettle('${e.id}')">↩取消</button></td>
      </tr>`;
    });
    shtml+=`</tbody></table></div>`;
  }
  document.getElementById('settledContainer').innerHTML=shtml;
}

function renderTatekaePersonCards() {
  const persons=["立替（代表理事・土井）","立替（理事・越宗）","立替（理事・安井）","立替（事務局・石川）"];
  let html='<div class="person-grid">';
  persons.forEach(p=>{
    const all=entries.filter(e=>e.payType===p&&e.isTatekae);
    const unsettled=all.filter(e=>!e.settled);
    const settled=all.filter(e=>e.settled);
    const unAmt=unsettled.reduce((s,e)=>s+(e.amountIn||0),0);
    const stAmt=settled.reduce((s,e)=>s+(e.amountIn||0),0);
    const label=PAY_LABELS[p]||p;
    html+=`<div class="person-card">
      <div class="person-name">👤 ${label}</div>
      <div class="person-amount">¥${unAmt.toLocaleString()}</div>
      <div class="person-count">未精算 ${unsettled.length}件</div>
      ${stAmt>0?`<div class="person-settled">✅ 精算済 ¥${stAmt.toLocaleString()}（${settled.length}件）</div>`:''}
    </div>`;
  });
  html+='</div>';
  document.getElementById('tatekaePersonCards').innerHTML=html;
}

// チェックボックス全選択
function toggleAllChecks(cb) {
  document.querySelectorAll('.settle-check').forEach(c=>c.checked=cb.checked);
}

// ===== 個別精算モーダル =====
function openSettle(id) {
  settlingId=id;
  const e=entries.find(x=>x.id===id);
  if(!e) return;
  const opts=SETTLE_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('settleModalContent').innerHTML=`
    <div style="background:var(--cream);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">
      <div style="font-weight:700;color:var(--navy);margin-bottom:4px">${e.receiptId} — ${e.desc}</div>
      <div style="color:var(--gray-600)">${e.date} / ${e.vendor}</div>
      <div style="font-size:18px;font-weight:700;color:var(--red);margin-top:6px">¥${(e.amountIn||0).toLocaleString()}</div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">精算日</label>
        <input type="date" id="settleDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-group">
        <label class="required">精算方法</label>
        <select id="settleMethod">${opts}</select>
      </div>
      <div class="form-group full">
        <label>備考</label>
        <input type="text" id="settleNote" placeholder="例：〇月分まとめて精算">
      </div>
    </div>`;
  document.getElementById('settleModal').style.display='flex';
}

async function confirmSettle() {
  if(!settlingId) return;
  const date=document.getElementById('settleDate').value;
  const method=document.getElementById('settleMethod').value;
  if(!date){showToast('精算日を入力してください','error');return;}
  try {
    await window._fb.updateDoc(window._fb.doc(window._fb.db,'expenses',settlingId),{
      settled:true, settledDate:date, settledMethod:method,
      settledNote:document.getElementById('settleNote').value.trim(),
      settledAt:new Date().toISOString()
    });
    document.getElementById('settleModal').style.display='none';
    showToast('✅ 精算済みにしました','success');
    await loadEntries();
  } catch(e){showToast('エラー: '+e.message,'error');}
}

// ===== 一括精算 =====
function openBulkSettle() {
  const checked=[...document.querySelectorAll('.settle-check:checked')].map(c=>c.value);
  if(!checked.length){showToast('精算する項目を選択してください','error');return;}
  bulkSettleIds=checked;
  const targets=entries.filter(e=>checked.includes(e.id));
  const total=targets.reduce((s,e)=>s+(e.amountIn||0),0);
  const opts=SETTLE_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('');
  let rows=targets.map(e=>`<tr>
    <td><code style="font-size:11px">${e.receiptId}</code></td>
    <td>${e.date}</td><td>${e.vendor}</td>
    <td class="amount-cell">¥${(e.amountIn||0).toLocaleString()}</td>
  </tr>`).join('');
  document.getElementById('bulkSettleContent').innerHTML=`
    <div style="font-size:13px;margin-bottom:12px">
      <strong style="color:var(--navy)">${checked.length}件</strong>、
      合計 <strong style="color:var(--red)">¥${total.toLocaleString()}</strong> を精算します
    </div>
    <div class="table-wrap" style="margin-bottom:16px"><table>
      <thead><tr><th>番号</th><th>日付</th><th>支払先</th><th style="text-align:right">金額</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="required">精算日</label>
        <input type="date" id="bulkSettleDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-group">
        <label class="required">精算方法</label>
        <select id="bulkSettleMethod">${opts}</select>
      </div>
      <div class="form-group full">
        <label>備考</label>
        <input type="text" id="bulkSettleNote" placeholder="例：〇月分まとめて精算">
      </div>
    </div>`;
  document.getElementById('bulkSettleModal').style.display='flex';
}

async function confirmBulkSettle() {
  const date=document.getElementById('bulkSettleDate').value;
  const method=document.getElementById('bulkSettleMethod').value;
  if(!date){showToast('精算日を入力してください','error');return;}
  const note=document.getElementById('bulkSettleNote').value.trim();
  try {
    for(const id of bulkSettleIds){
      await window._fb.updateDoc(window._fb.doc(window._fb.db,'expenses',id),{
        settled:true, settledDate:date, settledMethod:method,
        settledNote:note, settledAt:new Date().toISOString()
      });
    }
    document.getElementById('bulkSettleModal').style.display='none';
    showToast(`✅ ${bulkSettleIds.length}件を精算済みにしました`,'success');
    bulkSettleIds=[];
    await loadEntries();
  } catch(e){showToast('エラー: '+e.message,'error');}
}

// ===== 精算取消 =====
function openCancelSettle(id) {
  cancelSettlingId=id;
  const e=entries.find(x=>x.id===id);
  if(!e) return;
  document.getElementById('cancelSettleContent').innerHTML=`
    <div class="confirm-box">⚠️ 以下の精算記録を取り消します。この操作は元に戻せません。</div>
    <div style="background:var(--cream);border-radius:8px;padding:12px;font-size:13px">
      <div style="font-weight:700;color:var(--navy)">${e.receiptId} — ${e.desc}</div>
      <div style="color:var(--gray-600);margin-top:4px">
        精算日：${e.settledDate||'—'} / 方法：${e.settledMethod||'—'}
      </div>
      <div style="font-size:17px;font-weight:700;color:var(--navy);margin-top:6px">
        ¥${(e.amountIn||0).toLocaleString()}
      </div>
    </div>`;
  document.getElementById('cancelSettleModal').style.display='flex';
}

async function confirmCancelSettle() {
  if(!cancelSettlingId) return;
  try {
    await window._fb.updateDoc(window._fb.doc(window._fb.db,'expenses',cancelSettlingId),{
      settled:false, settledDate:'', settledMethod:'', settledNote:'', settledAt:''
    });
    document.getElementById('cancelSettleModal').style.display='none';
    showToast('↩️ 精算を取り消しました','success');
    await loadEntries();
  } catch(e){showToast('エラー: '+e.message,'error');}
}

// ===== 編集モーダル =====
function openEdit(id) {
  editingId=id;
  const e=entries.find(x=>x.id===id);
  if(!e) return;
  const kOpts=KAMOKU_LIST.map(k=>`<option value="${k}" ${e.kamoku===k?'selected':''}>${k}</option>`).join('');
  const pOpts=PAY_TYPES.map(p=>`<option value="${p}" ${e.payType===p?'selected':''}>${p}</option>`).join('');
  const prOpts=PROOF_TYPES.map(p=>`<option value="${p}" ${e.proof===p?'selected':''}>${p}</option>`).join('');
  const invOpts=INVOICE_TYPES.map(v=>`<option value="${v}" ${e.invoice===v?'selected':''}>${v}</option>`).join('');
  document.getElementById('editFormContent').innerHTML=`
    <div class="form-group">
      <label>領収書番号</label>
      <div class="receipt-id-display">${e.receiptId||'—'}</div>
    </div>
    <div class="form-group">
      <label class="required">支払日</label>
      <input type="date" id="edit_date" value="${e.date||''}">
    </div>
    <div class="form-group">
      <label class="required">勘定科目</label>
      <select id="edit_kamoku">${kOpts}</select>
    </div>
    <div class="form-group">
      <label class="required">支払区分</label>
      <select id="edit_payType">${pOpts}</select>
    </div>
    <div class="form-group">
      <label class="required">金額（税抜）</label>
      <input type="number" id="edit_amountEx" value="${e.amountEx||0}" oninput="calcEditTax()">
    </div>
    <div class="form-group">
      <label>消費税率</label>
      <select id="edit_taxRate" onchange="calcEditTax()">
        <option value="0.10" ${e.taxRate==0.10?'selected':''}>10%</option>
        <option value="0.08" ${e.taxRate==0.08?'selected':''}>8%</option>
        <option value="0" ${e.taxRate==0?'selected':''}>非課税</option>
      </select>
    </div>
    <div class="form-group">
      <label>消費税額</label>
      <input type="number" id="edit_taxAmt" value="${e.taxAmt||0}" readonly class="readonly-field">
    </div>
    <div class="form-group">
      <label>税込合計</label>
      <input type="number" id="edit_amountIn" value="${e.amountIn||0}" readonly class="readonly-field">
    </div>
    <div class="form-group full">
      <label class="required">支払先</label>
      <input type="text" id="edit_vendor" value="${e.vendor||''}">
    </div>
    <div class="form-group full">
      <label class="required">品目・摘要</label>
      <input type="text" id="edit_desc" value="${e.desc||''}">
    </div>
    <div class="form-group full">
      <label>事業関連性・備考</label>
      <textarea id="edit_note">${e.note||''}</textarea>
    </div>
    <div class="form-group">
      <label>インボイス</label>
      <select id="edit_invoice">${invOpts}</select>
    </div>
    <div class="form-group">
      <label>証憑種類</label>
      <select id="edit_proof">${prOpts}</select>
    </div>
    <div class="form-group full">
      <label>領収書画像リンク</label>
      <input type="url" id="edit_imageUrl" value="${e.imageUrl||''}" placeholder="Google DriveのリンクURL">
    </div>
    ${e.settled?`<div class="form-group full">
      <div class="settled-info">✅ この経費は精算済みです（精算日：${e.settledDate} / ${e.settledMethod}）<br>
      精算を取り消す場合は「立替金精算」タブから操作してください。</div>
    </div>`:''}
  `;
  document.getElementById('editModal').style.display='flex';
}

function calcEditTax() {
  const ex=parseFloat(document.getElementById('edit_amountEx').value)||0;
  const rate=parseFloat(document.getElementById('edit_taxRate').value)||0;
  const tax=Math.floor(ex*rate);
  document.getElementById('edit_taxAmt').value=tax;
  document.getElementById('edit_amountIn').value=ex+tax;
}

async function updateEntry() {
  if(!editingId||!firebaseReady) return;
  const amountEx=parseFloat(document.getElementById('edit_amountEx').value)||0;
  const taxRate=parseFloat(document.getElementById('edit_taxRate').value)||0;
  const taxAmt=Math.floor(amountEx*taxRate);
  const payType=document.getElementById('edit_payType').value;
  const data={
    date:document.getElementById('edit_date').value,
    kamoku:document.getElementById('edit_kamoku').value,
    payType, amountEx, taxRate, taxAmt, amountIn:amountEx+taxAmt,
    vendor:document.getElementById('edit_vendor').value.trim(),
    desc:document.getElementById('edit_desc').value.trim(),
    note:document.getElementById('edit_note').value.trim(),
    invoice:document.getElementById('edit_invoice').value,
    proof:document.getElementById('edit_proof').value,
    imageUrl:document.getElementById('edit_imageUrl').value.trim(),
    isTatekae:payType.includes('立替'),
    updatedAt:new Date().toISOString()
  };
  try {
    await window._fb.updateDoc(window._fb.doc(window._fb.db,'expenses',editingId),data);
    document.getElementById('editModal').style.display='none';
    showToast('✅ 更新しました','success');
    await loadEntries();
  } catch(e){showToast('更新エラー: '+e.message,'error');}
}

async function deleteEntry() {
  if(!editingId||!firebaseReady) return;
  const e=entries.find(x=>x.id===editingId);
  if(!confirm(`「${e?.receiptId} ${e?.desc}」を削除しますか？\nこの操作は取り消せません。`)) return;
  try {
    await window._fb.deleteDoc(window._fb.doc(window._fb.db,'expenses',editingId));
    document.getElementById('editModal').style.display='none';
    showToast('🗑 削除しました','success');
    await loadEntries();
  } catch(e){showToast('削除エラー: '+e.message,'error');}
}

// ===== 集計 =====
function renderSummary() {
  const totalIn=entries.reduce((s,e)=>s+(e.amountIn||0),0);
  const totalEx=entries.reduce((s,e)=>s+(e.amountEx||0),0);
  const totalTax=entries.reduce((s,e)=>s+(e.taxAmt||0),0);
  const unsettledAmt=entries.filter(e=>e.isTatekae&&!e.settled).reduce((s,e)=>s+(e.amountIn||0),0);
  const settledAmt=entries.filter(e=>e.isTatekae&&e.settled).reduce((s,e)=>s+(e.amountIn||0),0);

  const byKamoku={};
  entries.forEach(e=>{
    if(!byKamoku[e.kamoku])byKamoku[e.kamoku]={ex:0,tax:0,inc:0,cnt:0};
    byKamoku[e.kamoku].ex+=e.amountEx||0;
    byKamoku[e.kamoku].tax+=e.taxAmt||0;
    byKamoku[e.kamoku].inc+=e.amountIn||0;
    byKamoku[e.kamoku].cnt++;
  });

  let html=`
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">経費合計（税込）</div>
        <div class="summary-value">¥${totalIn.toLocaleString()}</div>
        <div class="summary-sub">${entries.length}件</div>
      </div>
      <div class="summary-card" style="border-left-color:#2d7a4f">
        <div class="summary-label">経費合計（税抜）</div>
        <div class="summary-value" style="font-size:17px">¥${totalEx.toLocaleString()}</div>
        <div class="summary-sub">消費税 ¥${totalTax.toLocaleString()}</div>
      </div>
      <div class="summary-card" style="border-left-color:#c0392b">
        <div class="summary-label">立替金 未精算残高</div>
        <div class="summary-value" style="color:#c0392b;font-size:17px">¥${unsettledAmt.toLocaleString()}</div>
        <div class="summary-sub">精算済 ¥${settledAmt.toLocaleString()}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 勘定科目別集計</div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>勘定科目</th><th style="text-align:right">税抜</th>
          <th style="text-align:right">消費税</th><th style="text-align:right">税込</th>
          <th style="text-align:right">構成比</th>
        </tr></thead><tbody>`;

  Object.entries(byKamoku).sort((a,b)=>b[1].inc-a[1].inc).forEach(([k,v])=>{
    const pct=totalIn>0?(v.inc/totalIn*100).toFixed(1):0;
    html+=`<tr>
      <td><span class="kamoku-badge">${k}</span></td>
      <td class="amount-cell">¥${v.ex.toLocaleString()}</td>
      <td class="amount-cell" style="color:var(--gray-600)">¥${v.tax.toLocaleString()}</td>
      <td class="amount-cell">¥${v.inc.toLocaleString()}</td>
      <td style="text-align:right;color:var(--gray-600)">${pct}%</td>
    </tr>`;
  });

  html+=`<tr style="background:var(--navy);color:var(--white)">
    <td><strong>合計</strong></td>
    <td class="amount-cell" style="color:var(--gold)">¥${totalEx.toLocaleString()}</td>
    <td class="amount-cell" style="color:rgba(255,255,255,.7)">¥${totalTax.toLocaleString()}</td>
    <td class="amount-cell" style="color:var(--gold)">¥${totalIn.toLocaleString()}</td>
    <td></td>
  </tr></tbody></table></div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-gold" onclick="exportExcel('all')">📥 決算用Excelを出力</button>
    </div>
  </div>`;

  document.getElementById('summaryContent').innerHTML=html;
}

// ===== Excel出力 =====
function exportExcel(mode) {
  if(!entries.length){showToast('データがありません','error');return;}
  const wb=XLSX.utils.book_new();
  const now=new Date().toISOString().slice(0,10);

  if(mode==='all'||mode==='tatekae') {
    // 経費明細シート
    const header=['領収書番号','支払日','勘定科目','支払先','品目・摘要','支払区分',
      '金額（税抜）','消費税率','消費税額','金額（税込）','精算状況','精算日','精算方法',
      'インボイス','証憑種類','備考','登録日'];
    const rows=entries.map(e=>[
      e.receiptId||'',e.date||'',e.kamoku||'',e.vendor||'',e.desc||'',
      PAY_LABELS[e.payType]||e.payType||'',
      e.amountEx||0, e.taxRate?(e.taxRate*100)+'%':'0%', e.taxAmt||0, e.amountIn||0,
      e.isTatekae?(e.settled?'精算済':'未精算'):'—',
      e.settledDate||'',e.settledMethod||'',
      e.invoice||'',e.proof||'',e.note||'',(e.createdAt||'').slice(0,10)
    ]);
    const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
    ws['!cols']=[{wch:14},{wch:12},{wch:14},{wch:20},{wch:28},{wch:16},
      {wch:12},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12},{wch:12},
      {wch:12},{wch:12},{wch:28},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws,'経費明細');
  }

  if(mode==='all') {
    // 勘定科目別集計
    const byK={};
    entries.forEach(e=>{
      if(!byK[e.kamoku])byK[e.kamoku]={ex:0,tax:0,inc:0,cnt:0};
      byK[e.kamoku].ex+=e.amountEx||0; byK[e.kamoku].tax+=e.taxAmt||0;
      byK[e.kamoku].inc+=e.amountIn||0; byK[e.kamoku].cnt++;
    });
    const sh2=[['勘定科目','件数','税抜合計','消費税','税込合計']];
    Object.entries(byK).sort((a,b)=>b[1].inc-a[1].inc).forEach(([k,v])=>
      sh2.push([k,v.cnt,v.ex,v.tax,v.inc]));
    sh2.push(['【合計】',entries.length,
      entries.reduce((s,e)=>s+(e.amountEx||0),0),
      entries.reduce((s,e)=>s+(e.taxAmt||0),0),
      entries.reduce((s,e)=>s+(e.amountIn||0),0)]);
    const ws2=XLSX.utils.aoa_to_sheet(sh2);
    ws2['!cols']=[{wch:18},{wch:8},{wch:14},{wch:12},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,'勘定科目別集計');
  }

  // 立替金精算表
  const tatAll=entries.filter(e=>e.isTatekae);
  const th3=['領収書番号','支払日','立替者','支払先','品目・摘要',
    '金額（税込）','精算状況','精算日','精算方法','精算備考'];
  const tr3=tatAll.map(e=>[
    e.receiptId||'',e.date||'',PAY_LABELS[e.payType]||e.payType||'',
    e.vendor||'',e.desc||'',e.amountIn||0,
    e.settled?'精算済':'未精算',e.settledDate||'',e.settledMethod||'',e.settledNote||''
  ]);
  // 立替者別小計
  const persons=["立替（代表理事・土井）","立替（理事・越宗）","立替（理事・安井）","立替（事務局・石川）"];
  persons.forEach(p=>{
    const amt=tatAll.filter(e=>e.payType===p&&!e.settled).reduce((s,e)=>s+(e.amountIn||0),0);
    if(amt>0) tr3.push(['','',`【${PAY_LABELS[p]} 未精算小計】`,'','',amt,'','','','']);
  });
  tr3.push(['','','【立替合計（未精算）】','','',
    tatAll.filter(e=>!e.settled).reduce((s,e)=>s+(e.amountIn||0),0),'','','','']);
  const ws3=XLSX.utils.aoa_to_sheet([th3,...tr3]);
  ws3['!cols']=[{wch:14},{wch:12},{wch:16},{wch:20},{wch:26},{wch:14},{wch:10},{wch:12},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws3,'立替金精算表');

  XLSX.writeFile(wb,`一般社団法人P_経費精算_${now}.xlsx`);
  showToast('📥 Excelを出力しました','success');
}

// ===== トースト =====
function showToast(msg,type='success') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ===== 初期化 =====
document.getElementById('entryDate').value=new Date().toISOString().slice(0,10);
</script>
